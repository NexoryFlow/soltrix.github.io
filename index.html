<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexory Flow | Next Gen</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-scene">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="avatar-block">
                <div class="avatar-glow"></div>
                <img src="img/logoprofilna.png" alt="Nexory" class="avatar-img">
                <div class="v-icon"><i class="fa-solid fa-check"></i></div>
            </div>
            <h1 class="brand-name">Nexory Flow</h1>
            <p class="brand-subtitle">Digitalna rešenja</p>
        </header>

        <div class="slider-frame">
            <div class="slider-track">
                <img src="img/cover.jpeg" alt="Cover 1">
                <img src="img/cover2.jpeg" alt="Cover 2">
                <img src="img/cover3.jpeg" alt="Cover 3">
                <img src="img/cover.jpeg" alt="Cover 1">
            </div>
            <div class="slider-overlay"></div>
        </div>

        <nav class="nav-links">
            <a href="https://nexoryflow.github.io/nexory/index-sr.html" target="_blank" class="glass-btn">
                <div class="btn-inner">
                    <div class="btn-icon"><i class="fa-solid fa-globe"></i></div>
                    <div class="btn-data">
                        <span class="btn-label">Lični sajt</span>
                        <span class="btn-url">nexoryflow.com</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
            </a>

            <a href="mailto:team.nexory@gmail.com" class="glass-btn">
                <div class="btn-inner">
                    <div class="btn-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div class="btn-data">
                        <span class="btn-label">Kontakt</span>
                        <span class="btn-url">team.nexory@gmail.com</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
            </a>

            <a href="https://instagram.com/nexoryflow" target="_blank" class="glass-btn">
                <div class="btn-inner">
                    <div class="btn-icon"><i class="fa-brands fa-instagram"></i></div>
                    <div class="btn-data">
                        <span class="btn-label">Instagram</span>
                        <span class="btn-url">@nexoryflow</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
            </a>

            <a href="https://facebook.com/nexoryflow" target="_blank" class="glass-btn">
                <div class="btn-inner">
                    <div class="btn-icon"><i class="fa-brands fa-facebook-f"></i></div>
                    <div class="btn-data">
                        <span class="btn-label">Facebook</span>
                        <span class="btn-url">Nexory Flow</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
            </a>

            <a href="https://paypal.me/nexoryflow" target="_blank" class="glass-btn paypal">
                <div class="btn-inner">
                    <div class="btn-icon"><i class="fa-brands fa-paypal"></i></div>
                    <div class="btn-data">
                        <span class="btn-label">PayPal</span>
                        <span class="btn-url">Support Work</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
            </a>
        </nav>

        <footer class="footer">
            <div class="divider"></div>
            <div class="skill-icons">
                <img src="img/framer.svg" alt="">
                <img src="img/figma.svg" alt="">
                <img src="img/github.svg" alt="">
                <img src="img/meta.svg" alt="">
            </div>
        </footer>
    </div>

</body>
</html>
